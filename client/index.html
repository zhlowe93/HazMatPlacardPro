<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
    <title>HazMat Placard Pro - CDL Driver Tool</title>
    <meta name="description" content="Determine required DOT placards for hazardous materials based on CFR 49 regulations. Essential compliance tool for CDL hazmat drivers." />

    <!-- PWA -->
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HazMat Pro" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Prevent phone number detection (UN numbers look like phone numbers) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
